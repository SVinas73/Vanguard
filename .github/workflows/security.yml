name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      # TODO: upgrade `next` (14.2.5 -> latest 14.x patch) y `jspdf` (3 -> 4)
      # para limpiar las vulns critical actuales. Mientras, este step
      # reporta pero no bloquea PRs.
      - name: Report vulnerabilities (non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high --omit=dev

  secrets-scan:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
