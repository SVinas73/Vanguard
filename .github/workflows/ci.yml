name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Type check + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run

      - name: Build (skipped — requires env vars)
        # El build necesita NEXT_PUBLIC_SUPABASE_URL y otras vars.
        # Para correr el build real configurá los secrets del repo:
        #   NEXT_PUBLIC_SUPABASE_URL
        #   NEXT_PUBLIC_SUPABASE_ANON_KEY
        #   SUPABASE_SERVICE_ROLE_KEY
        #   NEXTAUTH_SECRET
        # Y descomentá la línea de abajo.
        run: echo "Skipping build (descomenta cuando estén los secrets configurados)"
        # run: npm run build
        # env:
        #   NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        #   NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        #   SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        #   NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
